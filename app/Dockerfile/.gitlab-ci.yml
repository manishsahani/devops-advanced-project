stages:
  - build
  - push
  - deploy

variables:
  IMAGE_NAME: devops-app

before_script:
  - docker info

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME .

push:
  stage: push
  script:
    - echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
    - docker tag $IMAGE_NAME $DOCKER_USER/$IMAGE_NAME
    - docker push $DOCKER_USER/$IMAGE_NAME

deploy:
  stage: deploy
  script:
    - kubectl apply -f k8s/
