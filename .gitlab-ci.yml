image: docker:24.0.5

services:
  - docker:24.0.5-dind

stages:
  - build
  - push

variables:
  IMAGE_NAME: devops-app
  DOCKER_TLS_CERTDIR: ""

before_script:
  - docker info

build:
  stage: build
  script:
    - docker build -t $IMAGE_NAME .

push:
  stage: push
  script:
    - echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
    - docker tag $IMAGE_NAME $DOCKER_USER/$IMAGE_NAME
    - docker push $DOCKER_USER/$IMAGE_NAME